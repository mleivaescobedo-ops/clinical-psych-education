name: Auto-generate Educational Applications

on:
  push:
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  generate-summaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic python-frontmatter
      - name: Generate summaries
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_summary.py
      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add applications/auto_generated/
          git diff --staged --quiet || git commit -m "auto: regenerate [skip ci]"
          git push
